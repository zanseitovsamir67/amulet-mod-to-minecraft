name: Build Amulet Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o amuletmod.zip
          ls -la amuletmod/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle wrapper
        working-directory: ./amuletmod
        run: gradle wrapper --gradle-version 8.7

      - name: Make gradlew executable
        working-directory: ./amuletmod
        run: chmod +x gradlew

      - name: Build mod
        working-directory: ./amuletmod
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: amuletmod-jar
          path: amuletmod/build/libs/*.jar
